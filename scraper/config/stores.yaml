stores:
  - id: walmart
    name: "Walmart CR"
    base_url: "https://www.walmart.co.cr"
    category_urls:
      - "https://www.walmart.co.cr/electronica"
      - "https://www.walmart.co.cr/electrodomesticos"
      - "https://www.walmart.co.cr/computacion"
    selectors:
      product_container: ".vtex-search-result-3-x-galleryItem"
      name: ".custom-product-name"
      price: "[class*='sellingPriceValue']"
      original_price: "[class*='listPriceValue']"
      image: "img"
      link: "a[href]"
    enabled: true

  - id: gollo
    name: "Gollo"
    base_url: "https://www.gollo.com"
    category_urls:
      - "https://www.gollo.com/c/tecnologia/tv-y-video/pantallas"
      - "https://www.gollo.com/c/eletrodomesticos/refrigeracion"
      - "https://www.gollo.com/c/tecnologia/computadoras"
    selectors:
      product_container: ".product-item"
      name: "a.product-item-link"
      price: ".special-price .price"
      original_price: ".old-price .price"
      image: "img"
      link: "a.product-item-link"
    enabled: true

  - id: monge
    name: "Tienda Monge"
    base_url: "https://www.tiendamonge.com"
    category_urls:
      - "https://www.tiendamonge.com/productos/electrodomesticos"
      - "https://www.tiendamonge.com/productos/celulares-y-tablets/celulares"
      - "https://www.tiendamonge.com/productos/television"
    selectors:
      product_container: ".product-item"
      name: "strong.product-item-name"
      price: ".special-price .price"
      original_price: ".old-price .price"
      image: "img"
      link: "a.product-item-link"
    enabled: true
